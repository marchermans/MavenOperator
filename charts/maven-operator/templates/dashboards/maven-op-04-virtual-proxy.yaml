{{- if .Values.metrics.grafana.dashboards.enabled }}
{{- $ns := .Values.metrics.grafana.dashboards.namespace | default .Release.Namespace }}
{{- $label := .Values.metrics.grafana.dashboards.label }}
{{- $labelVal := .Values.metrics.grafana.dashboards.labelValue }}
{{- $ds := .Values.metrics.grafana.dashboards.datasourceUid }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: maven-op-04-virtual-proxy
  namespace: {{ $ns }}
  labels:
    {{- include "maven-operator.labels" . | nindent 4 }}
    {{ $label }}: {{ $labelVal | quote }}
  annotations:
    grafana-dashboard-uid: "maven-op-04"
data:
  maven-op-04-virtual-proxy.json: |-
    {
      "uid": "maven-op-04",
      "title": "Maven Virtual Proxy",
      "description": "Fan-out latency, member health, metadata merge cost.",
      "tags": ["maven-operator"],
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace", "type": "query",
            "datasource": { "type": "prometheus", "uid": "{{ $ds }}" },
            "query": "label_values(virtual_proxy_requests_total, namespace)",
            "refresh": 2, "includeAll": true, "current": {}
          },
          {
            "name": "repo", "type": "query",
            "datasource": { "type": "prometheus", "uid": "{{ $ds }}" },
            "query": "label_values(virtual_proxy_requests_total{namespace=\"$namespace\"}, repo_name)",
            "refresh": 2, "current": {}
          },
          {
            "name": "member", "type": "query",
            "datasource": { "type": "prometheus", "uid": "{{ $ds }}" },
            "query": "label_values(virtual_proxy_member_request_duration_seconds_count{repo_name=\"$repo\"}, member_name)",
            "refresh": 2, "includeAll": true, "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1, "title": "Overall Request Rate",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "{{ $ds }}" },
          "targets": [{ "expr": "sum(rate(virtual_proxy_requests_total{repo_name=\"$repo\"}[5m]))" }]
        },
        {
          "id": 2, "title": "Status Code Breakdown",
          "type": "bargauge",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "{{ $ds }}" },
          "targets": [{ "expr": "sum by (status_code) (rate(virtual_proxy_requests_total{repo_name=\"$repo\"}[5m]))", "legendFormat": "{{ "{{status_code}}" }}" }]
        },
        {
          "id": 3, "title": "Member Success Rate",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "{{ $ds }}" },
          "targets": [{ "expr": "sum by (member_name) (rate(virtual_proxy_member_request_duration_seconds_count{repo_name=\"$repo\",success=\"true\"}[5m])) / sum by (member_name) (rate(virtual_proxy_member_request_duration_seconds_count{repo_name=\"$repo\"}[5m]))", "legendFormat": "{{ "{{member_name}}" }}" }],
          "fieldConfig": { "defaults": { "unit": "percentunit" } }
        },
        {
          "id": 4, "title": "p95 Per-Member Latency",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "{{ $ds }}" },
          "targets": [{ "expr": "histogram_quantile(0.95, sum by (le, member_name) (rate(virtual_proxy_member_request_duration_seconds_bucket{repo_name=\"$repo\"}[5m])))", "legendFormat": "p95 {{ "{{member_name}}" }}" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 5, "title": "Metadata Merge p95 Latency",
          "type": "stat",
          "gridPos": { "x": 0, "y": 16, "w": 8, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "{{ $ds }}" },
          "targets": [{ "expr": "histogram_quantile(0.95, rate(virtual_proxy_metadata_merge_duration_seconds_bucket{repo_name=\"$repo\"}[5m]))" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 6, "title": "Requests by Asset Type",
          "type": "piechart",
          "gridPos": { "x": 8, "y": 16, "w": 16, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "{{ $ds }}" },
          "targets": [{ "expr": "sum by (asset_type) (rate(virtual_proxy_requests_total{repo_name=\"$repo\"}[5m]))", "legendFormat": "{{ "{{asset_type}}" }}" }]
        }
      ],
      "schemaVersion": 38
    }
{{- end }}

