{{- if .Values.metrics.grafana.dashboards.enabled }}
{{- $ns := .Values.metrics.grafana.dashboards.namespace | default .Release.Namespace }}
{{- $label := .Values.metrics.grafana.dashboards.label }}
{{- $labelVal := .Values.metrics.grafana.dashboards.labelValue }}
{{- $ds := .Values.metrics.grafana.dashboards.datasourceUid }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: maven-op-03-artifact-heatmap
  namespace: {{ $ns }}
  labels:
    {{- include "maven-operator.labels" . | nindent 4 }}
    {{ $label }}: {{ $labelVal | quote }}
  annotations:
    grafana-dashboard-uid: "maven-op-03"
data:
  maven-op-03-artifact-heatmap.json: |-
    {
      "uid": "maven-op-03",
      "title": "Maven Artifact Heatmap",
      "description": "Top-N artifacts by requests/bytes. High-cardinality — limit time range.",
      "tags": ["maven-operator"],
      "timezone": "browser",
      "refresh": "5m",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace", "type": "query",
            "datasource": { "type": "prometheus", "uid": "{{ $ds }}" },
            "query": "label_values(maven_artifact_requests_total, namespace)",
            "refresh": 2, "includeAll": true, "current": {}
          },
          {
            "name": "repo", "type": "query",
            "datasource": { "type": "prometheus", "uid": "{{ $ds }}" },
            "query": "label_values(maven_artifact_requests_total{namespace=\"$namespace\"}, repo)",
            "refresh": 2, "current": {}
          },
          { "name": "topN", "type": "custom", "options": [{"text":"10","value":"10"},{"text":"20","value":"20"},{"text":"50","value":"50"}], "current": {"text":"10","value":"10"} },
          { "name": "asset_type", "type": "custom", "options": [{"text":"All","value":".*"},{"text":"jar","value":"jar"},{"text":"pom","value":"pom"},{"text":"metadata","value":"metadata"}], "current": {"text":"All","value":".*"}, "includeAll": false }
        ]
      },
      "panels": [
        {
          "id": 1, "title": "Top $topN Artifacts by Request Count",
          "type": "table",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 10 },
          "datasource": { "type": "prometheus", "uid": "{{ $ds }}" },
          "targets": [{ "expr": "topk($topN, sum by (artifact_id, artifact_version, asset_type) (increase(maven_artifact_requests_total{repo=\"$repo\",asset_type=~\"$asset_type\"}[$__range])))", "legendFormat": "{{ "{{artifact_id}} {{artifact_version}} {{asset_type}}" }}", "instant": true }]
        },
        {
          "id": 2, "title": "Top $topN Artifacts by Bytes",
          "type": "table",
          "gridPos": { "x": 0, "y": 10, "w": 12, "h": 10 },
          "datasource": { "type": "prometheus", "uid": "{{ $ds }}" },
          "targets": [{ "expr": "topk($topN, sum by (artifact_id, asset_type) (increase(maven_artifact_bytes_total{repo=\"$repo\"}[$__range])))", "legendFormat": "{{ "{{artifact_id}} {{asset_type}}" }}", "instant": true }],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 3, "title": "Asset Type Distribution",
          "type": "piechart",
          "gridPos": { "x": 12, "y": 10, "w": 12, "h": 10 },
          "datasource": { "type": "prometheus", "uid": "{{ $ds }}" },
          "targets": [{ "expr": "sum by (asset_type) (increase(maven_artifact_requests_total{repo=\"$repo\"}[$__range]))", "legendFormat": "{{ "{{asset_type}}" }}", "instant": true }]
        },
        {
          "id": 4, "title": "Request Rate by Artifact ID (Top 10)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 20, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "{{ $ds }}" },
          "targets": [{ "expr": "topk(10, sum by (artifact_id) (rate(maven:artifact_requests_by_id{repo=\"$repo\"}[5m])))", "legendFormat": "{{ "{{artifact_id}}" }}" }]
        }
      ],
      "schemaVersion": 38
    }
{{- end }}

