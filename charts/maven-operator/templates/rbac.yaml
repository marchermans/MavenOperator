{{- if .Values.rbac.create -}}
{{- $operatorServiceAccountName := include "maven-operator.serviceAccountName" . -}}
{{- $importJobServiceAccountName := include "maven-operator.importJobServiceAccountName" . -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "maven-operator.fullname" . }}
  labels:
    {{- include "maven-operator.labels" . | nindent 4 }}
rules:
  # MavenRepository and MavenRepositoryImport CRDs
  - apiGroups: ["maven.operator.io"]
    resources: ["mavenrepositories", "mavenrepositoryimports"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["maven.operator.io"]
    resources: ["mavenrepositories/status", "mavenrepositoryimports/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["maven.operator.io"]
    resources: ["mavenrepositories/finalizers", "mavenrepositoryimports/finalizers"]
    verbs: ["update"]

  # Core resources managed or queried by the operator
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]

  # Apps and batch resources managed by reconcilers/controllers
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Networking resources managed by repository reconcilers
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Kubernetes Gateway API resources managed/queried by repository reconcilers
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "gatewayclasses", "referencegrants"]
    verbs: ["get", "list", "watch"]

  # Cert-Manager resources managed by repository reconcilers
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cert-manager.io"]
    resources: ["issuers", "clusterissuers"]
    verbs: ["get", "list", "watch"]

  # Prometheus Operator resources created when metrics are enabled
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["podmonitors"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "maven-operator.fullname" . }}
  labels:
    {{- include "maven-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "maven-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ $operatorServiceAccountName }}
    namespace: {{ .Release.Namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "maven-operator.fullname" . }}-import-job
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "maven-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "maven-operator.fullname" . }}-import-job
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "maven-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "maven-operator.fullname" . }}-import-job
subjects:
  - kind: ServiceAccount
    name: {{ $importJobServiceAccountName }}
    namespace: {{ .Release.Namespace }}
{{- end }}

