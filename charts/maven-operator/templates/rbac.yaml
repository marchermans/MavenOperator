{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "maven-operator.fullname" . }}
  labels:
    {{- include "maven-operator.labels" . | nindent 4 }}
rules:
  # MavenRepository CRDs
  - apiGroups: ["maven.operator.io"]
    resources: ["mavenrepositories"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["maven.operator.io"]
    resources: ["mavenrepositories/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["maven.operator.io"]
    resources: ["mavenrepositories/finalizers"]
    verbs: ["update"]
  # Core resources
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "persistentvolumeclaims",
                "configmaps", "secrets", "serviceaccounts", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Apps
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Networking
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "maven-operator.fullname" . }}
  labels:
    {{- include "maven-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "maven-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "maven-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

