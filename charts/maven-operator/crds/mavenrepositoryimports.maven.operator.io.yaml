---
# Generated from MavenOperator CRD entity classes.
# Group:   maven.operator.io
# Kind:    MavenRepositoryImport
# Version: v1alpha1
#
# A MavenRepositoryImport triggers a one-shot Kubernetes Job that migrates
# artifacts from an external Maven repository into an operator-managed
# Hosted MavenRepository.  Three import modes are supported:
#   - source.api.type=Reposilite  REST API crawl from a Reposilite instance
#   - source.api.type=JFrogCloud  REST API crawl from JFrog Artifactory Cloud
#   - source.pvcSnapshot          Disk-to-disk clone from a snapshot/backup PVC
#   - source.pvcLive              Disk-to-disk clone from the live Reposilite PVC
#                                 with optional Deployment scale-down
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mavenrepositoryimports.maven.operator.io
spec:
  group: maven.operator.io
  names:
    kind: MavenRepositoryImport
    listKind: MavenRepositoryImportList
    plural: mavenrepositoryimports
    singular: mavenrepositoryimport
    shortNames:
      - mvnimport
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [targetRepository, source]
              x-kubernetes-validations:
                # Exactly one source must be set
                - rule: >
                    (has(self.source.api) ? 1 : 0) +
                    (has(self.source.pvcSnapshot) ? 1 : 0) +
                    (has(self.source.pvcLive) ? 1 : 0) == 1
                  message: >
                    Exactly one of spec.source.api, spec.source.pvcSnapshot,
                    or spec.source.pvcLive must be set.
                # API source requires a non-empty URL
                - rule: "!has(self.source.api) || self.source.api.url != ''"
                  message: "spec.source.api.url must be non-empty when source.api is set"
                # PVC snapshot source requires a non-empty claimName
                - rule: "!has(self.source.pvcSnapshot) || self.source.pvcSnapshot.claimName != ''"
                  message: "spec.source.pvcSnapshot.claimName must be non-empty"
                # PVC live source requires a non-empty claimName
                - rule: "!has(self.source.pvcLive) || self.source.pvcLive.claimName != ''"
                  message: "spec.source.pvcLive.claimName must be non-empty"
              properties:
                targetRepository:
                  type: string
                  minLength: 1
                  description: >
                    Name of the target Hosted MavenRepository in the same namespace.
                    The repository must be in phase Ready before the import Job starts.

                source:
                  type: object
                  description: >
                    Import source — exactly one sub-field must be populated.
                  properties:
                    api:
                      type: object
                      nullable: true
                      description: REST API crawl source (Reposilite or JFrog Artifactory Cloud).
                      properties:
                        type:
                          type: string
                          enum: [Reposilite, JFrogCloud]
                          default: Reposilite
                        url:
                          type: string
                          description: Base URL of the source server, e.g. https://repo.example.com
                        repository:
                          type: string
                          description: Repository name or path on the source server.
                        credentialsSecret:
                          type: string
                          nullable: true
                          description: >
                            Secret containing credentials for the source server.
                            For Reposilite: keys 'username' and 'password'.
                            For JFrog Cloud: key 'token' (Bearer) or 'username'+'password'.
                        includeSignatures:
                          type: boolean
                          default: false
                          description: When true, also copies .asc GPG signature files.

                    pvcSnapshot:
                      type: object
                      nullable: true
                      description: >
                        Clone from an external or backup PVC — the PVC must not be
                        actively mounted by a running pod (ReadWriteOnce constraint).
                      properties:
                        claimName:
                          type: string
                          description: Name of the source PersistentVolumeClaim.
                        subPath:
                          type: string
                          nullable: true
                          description: Optional sub-directory within the PVC to use as root.
                        reposiliteLayout:
                          type: boolean
                          default: true
                          description: >
                            When true, strips the leading /<repository>/ path segment
                            present in Reposilite's on-disk layout.
                            Set to false for a raw Maven-layout PVC.

                    pvcLive:
                      type: object
                      nullable: true
                      description: >
                        Clone from the PVC of a running Reposilite instance.
                        The operator can optionally scale down the Reposilite Deployment
                        to zero before mounting the PVC for consistency.
                      properties:
                        claimName:
                          type: string
                          description: Name of the Reposilite PersistentVolumeClaim.
                        reposiliteDeployment:
                          type: string
                          nullable: true
                          description: >
                            Name of the Reposilite Deployment to scale to 0 before import.
                            Omit (or leave null) to run concurrently — requires RWX PVC.
                        scaleDownDuration:
                          type: string
                          default: "60s"
                          description: >
                            How long to wait for Reposilite pods to terminate before starting
                            the import Job. Set to "0s" to skip scale-down entirely.
                        subPath:
                          type: string
                          nullable: true

                filters:
                  type: object
                  nullable: true
                  description: Optional artifact filters applied across all import modes.
                  properties:
                    includeGroups:
                      type: array
                      items:
                        type: string
                      description: >
                        Glob list of Maven groupIds to include, e.g. ["com.example.*"].
                        When empty, all groups are included.
                    excludeGroups:
                      type: array
                      items:
                        type: string
                      description: Glob list of Maven groupIds to exclude.
                    includeVersions:
                      type: array
                      items:
                        type: string
                      description: Glob list of versions to include, e.g. ["1.*", "2.0.*"].
                    sinceTimestamp:
                      type: string
                      nullable: true
                      description: >
                        RFC3339 timestamp — skip artifacts not modified after this time.
                        Useful for incremental imports.

                options:
                  type: object
                  nullable: true
                  description: Tuning options for the import Job.
                  properties:
                    parallelism:
                      type: integer
                      default: 8
                      minimum: 1
                      maximum: 64
                      description: Maximum concurrent artifact copy workers.
                    checksumValidation:
                      type: boolean
                      default: true
                      description: After copying each artifact, re-read and compare SHA-256.
                    dryRun:
                      type: boolean
                      default: false
                      description: >
                        When true, discover and log all artifacts but make no writes.
                        Useful to preview what would be imported.
                    overwriteExisting:
                      type: boolean
                      default: false
                      description: >
                        When false (default), skip artifacts that already exist at the
                        target.  Set to true to force-overwrite all artifacts.
                    transferMode:
                      type: string
                      enum: [Auto, DirectWrite, Http]
                      default: Auto
                      description: >
                        Auto   — DirectWrite if target PVC is RWX-mountable, else Http.
                        DirectWrite — write bytes directly to the target PVC filesystem.
                        Http   — upload via HTTP PUT to the NGINX WebDAV endpoint.

            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true

      additionalPrinterColumns:
        - name: Target
          type: string
          jsonPath: .spec.targetRepository
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Discovered
          type: integer
          jsonPath: .status.artifactsDiscovered
        - name: Copied
          type: integer
          jsonPath: .status.artifactsCopied
        - name: Failed
          type: integer
          jsonPath: .status.artifactsFailed
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp

