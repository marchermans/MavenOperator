# Default values for maven-operator.
# Override these in your own values.yaml or with --set flags.

# -- Number of operator replicas (leader-election ensures only 1 is active)
replicaCount: 1

image:
  # -- Operator image repository (without tag)
  repository: ghcr.io/marchermans/maven-operator
  pullPolicy: IfNotPresent
  # -- Overrides the image tag; defaults to Chart.appVersion
  tag: ""

virtualProxy:
  image:
    # -- Virtual-proxy image repository (without tag)
    repository: ghcr.io/marchermans/maven-virtual-proxy
    pullPolicy: IfNotPresent
    # -- Overrides the image tag; defaults to Chart.appVersion
    tag: ""

authProxy:
  image:
    # -- Auth-proxy image repository (without tag)
    repository: ghcr.io/marchermans/maven-auth-proxy
    pullPolicy: IfNotPresent
    # -- Overrides the image tag; defaults to Chart.appVersion
    tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  name: ""

importJob:
  serviceAccount:
    # -- Create the ServiceAccount used by MavenRepositoryImport Jobs for in-cluster progress reporting.
    create: true
    # -- Annotations to add to the import Job service account.
    annotations: {}
    # -- Overrides the import Job ServiceAccount name. Defaults to <release>-maven-operator-import.
    name: ""

# -- Annotations applied to the operator Pod
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

metrics:
  # -- Enable the Prometheus ServiceMonitor (requires prometheus-operator CRDs)
  serviceMonitor:
    enabled: false
    # -- Namespace to create the ServiceMonitor in (defaults to release namespace)
    namespace: ""
    # -- Additional labels for the ServiceMonitor (e.g. to match a Prometheus instance)
    additionalLabels: {}
    interval: 30s
    scrapeTimeout: 10s

  # -- NGINX sidecar images injected into every repository pod when spec.metrics.enabled=true
  sidecars:
    nginxExporter:
      image: nginx/nginx-prometheus-exporter:1.4
      resources:
        limits:   { cpu: 50m,  memory: 32Mi }
        requests: { cpu: 10m,  memory: 16Mi }
    mtail:
      image: ghcr.io/google/mtail:latest
      resources:
        limits:   { cpu: 100m, memory: 64Mi }
        requests: { cpu: 20m,  memory: 32Mi }

  # -- PodMonitor for per-pod scraping (requires prometheus-operator CRDs)
  podMonitor:
    enabled: false
    # -- Additional labels for the PodMonitor
    additionalLabels: {}
    interval: 30s
    scrapeTimeout: 10s

  # -- Grafana dashboard ConfigMaps (auto-loaded by Grafana sidecar)
  grafana:
    dashboards:
      enabled: false
      # -- Label Grafana uses to discover dashboard ConfigMaps
      label: grafana_dashboard
      labelValue: "1"
      # -- Namespace for dashboard ConfigMaps (defaults to release namespace)
      namespace: ""
      # -- Grafana datasource UID to substitute into dashboard JSON
      datasourceUid: prometheus
    alertRules:
      enabled: false
      # -- Namespace for PrometheusRule (defaults to release namespace)
      namespace: ""
      # -- Additional labels for the PrometheusRule (e.g. release: kube-prometheus-stack)
      additionalLabels: {}

# -- RBAC ClusterRole/ClusterRoleBinding for the operator
rbac:
  create: true

nodeSelector: {}
tolerations: []
affinity: {}

