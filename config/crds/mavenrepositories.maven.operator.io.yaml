---
# Generated from MavenOperator CRD entity classes.
# Group:   maven.operator.io
# Kind:    MavenRepository
# Version: v1alpha1
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mavenrepositories.maven.operator.io
spec:
  group: maven.operator.io
  names:
    kind: MavenRepository
    listKind: MavenRepositoryList
    plural: mavenrepositories
    singular: mavenrepository
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-validations:
                # Hosted must have storage
                - rule: "self.type != 'Hosted' || has(self.storage)"
                  message: "spec.storage is required when type is Hosted"
                # Proxy must have upstream with a non-empty URL
                - rule: "self.type != 'Proxy' || (has(self.upstream) && self.upstream.url != '')"
                  message: "spec.upstream.url is required when type is Proxy"
                # Virtual must have at least one member
                - rule: "self.type != 'Virtual' || (has(self.virtual) && self.virtual.members.size() > 0)"
                  message: "spec.virtual.members must be non-empty when type is Virtual"
                # Authenticated download requires at least one basic user or CI trust binding.
                - rule: "self.auth.download.policy != 'Authenticated' || self.auth.download.users.size() > 0 || self.auth.download.ciTrust.size() > 0"
                  message: "spec.auth.download requires users or ciTrust when policy is Authenticated"
                # Hosted repos only: authenticated upload requires at least one basic user or CI trust binding.
                - rule: "self.type != 'Hosted' || self.auth.upload.policy != 'Authenticated' || self.auth.upload.users.size() > 0 || self.auth.upload.ciTrust.size() > 0"
                  message: "spec.auth.upload requires users or ciTrust when type is Hosted and policy is Authenticated"
                # Cannot enable both ingress and gateway simultaneously.
                - rule: "!(self.ingress.enabled && self.gateway.enabled)"
                  message: "spec.ingress and spec.gateway cannot both be enabled at the same time"
                # Gateway enabled → gatewayRef.name must be present.
                - rule: "!self.gateway.enabled || self.gateway.gatewayRef.name != ''"
                  message: "spec.gateway.gatewayRef.name is required when gateway is enabled"
              properties:
                type:
                  type: string
                  enum: [Hosted, Proxy, Virtual]
                  default: Hosted
                storage:
                  type: object
                  properties:
                    size:
                      type: string
                      default: "10Gi"
                    storageClassName:
                      type: string
                      nullable: true
                    accessMode:
                      type: string
                      enum: [ReadWriteOnce, ReadWriteMany, ReadWriteOncePod]
                      default: ReadWriteMany
                      description: >
                        PVC access mode. Defaults to ReadWriteMany so the import Job
                        can mount the PVC directly alongside the NGINX pod, and to
                        support future HA deployments with multiple replicas.
                    deletionPolicy:
                      type: string
                      enum: [Retain, Delete]
                      default: Retain
                upstream:
                  type: object
                  nullable: true
                  properties:
                    url:
                      type: string
                    cacheTtl:
                      type: string
                      default: "1d"
                    cachePvcSize:
                      type: string
                      nullable: true
                    auth:
                      type: object
                      nullable: true
                      properties:
                        secretRef:
                          type: string
                virtual:
                  type: object
                  nullable: true
                  properties:
                    members:
                      type: array
                      items:
                        type: string
                    metadataCacheTtlSeconds:
                      type: integer
                      default: 60
                auth:
                  type: object
                  properties:
                    download:
                      type: object
                      properties:
                        policy:
                          type: string
                          enum: [Anonymous, Authenticated]
                          default: Anonymous
                        users:
                          type: array
                          items:
                            type: object
                            properties:
                              secretRef:
                                type: string
                              role:
                                type: string
                                enum: [Reader, Deployer, Admin]
                                default: Deployer
                        ciTrust:
                          type: array
                          items:
                            type: object
                            properties:
                              platform:
                                type: string
                                enum: [GitHubActions, GitLab]
                                default: GitHubActions
                              issuerUrl:
                                type: string
                                nullable: true
                              audience:
                                type: string
                                nullable: true
                              role:
                                type: string
                                enum: [Reader, Deployer, Admin]
                                default: Deployer
                              claims:
                                type: object
                                additionalProperties:
                                  type: string
                        acls:
                          type: array
                          items:
                            type: object
                            properties:
                              path:
                                type: string
                              roles:
                                type: array
                                items:
                                  type: string
                                  enum: [Reader, Deployer, Admin]
                    upload:
                      type: object
                      properties:
                        policy:
                          type: string
                          enum: [Anonymous, Authenticated]
                          default: Authenticated
                        users:
                          type: array
                          items:
                            type: object
                            properties:
                              secretRef:
                                type: string
                              role:
                                type: string
                                enum: [Reader, Deployer, Admin]
                                default: Deployer
                        ciTrust:
                          type: array
                          items:
                            type: object
                            properties:
                              platform:
                                type: string
                                enum: [GitHubActions, GitLab]
                                default: GitHubActions
                              issuerUrl:
                                type: string
                                nullable: true
                              audience:
                                type: string
                                nullable: true
                              role:
                                type: string
                                enum: [Reader, Deployer, Admin]
                                default: Deployer
                              claims:
                                type: object
                                additionalProperties:
                                  type: string
                        acls:
                          type: array
                          items:
                            type: object
                            properties:
                              path:
                                type: string
                              roles:
                                type: array
                                items:
                                  type: string
                                  enum: [Reader, Deployer, Admin]
                ingress:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    host:
                      type: string
                      nullable: true
                    path:
                      type: string
                      nullable: true
                    tlsSecretRef:
                      type: string
                      nullable: true
                gateway:
                  type: object
                  description: >
                    Kubernetes Gateway API exposure. When enabled the operator creates an
                    HTTPRoute pointing at an existing Gateway. Mutually exclusive with
                    spec.ingress.
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    gatewayRef:
                      type: object
                      properties:
                        name:
                          type: string
                          description: Name of the existing Gateway resource. Required when gateway.enabled is true.
                        namespace:
                          type: string
                          nullable: true
                          description: Namespace of the Gateway resource. Defaults to the MavenRepository namespace.
                        sectionName:
                          type: string
                          nullable: true
                          description: Listener section name inside the Gateway. Omit to attach to all compatible listeners.
                    hostname:
                      type: string
                      nullable: true
                      description: Hostname added to the HTTPRoute hostnames list.
                    path:
                      type: string
                      nullable: true
                      description: >
                        URL path prefix for the HTTPRoute match rule.
                        Defaults to /repository/{name} when absent.
                    tlsSecretRef:
                      type: string
                      nullable: true
                      description: >
                        Name of a TLS Secret in the same namespace for HTTPS termination.
                        When set, status.url is prefixed with https:// otherwise http://.
                        Cannot be combined with spec.gateway.certManager.
                    certManager:
                      type: object
                      nullable: true
                      description: >
                        CertManager Certificate issuer configuration for automatic TLS certificate provisioning.
                        When enabled, the operator creates a Certificate resource and the secret name is
                        automatically managed by CertManager. Cannot be combined with spec.gateway.tlsSecretRef.
                      properties:
                        issuerName:
                          type: string
                          description: >
                            Name of an existing CertManager Issuer or ClusterIssuer resource.
                            Required when CertManager support is enabled.
                        isClusterIssuer:
                          type: boolean
                          default: false
                          description: >
                            Whether the referenced issuer is a ClusterIssuer (true) or Issuer (false).
                            Defaults to false (Issuer in the same namespace).
                        email:
                          type: string
                          nullable: true
                          description: >
                            Optional email address for the certificate. Some issuers require this
                            (e.g. Let's Encrypt).
                        renewBefore:
                          type: string
                          default: "2160h"
                          description: >
                            Duration after which the certificate should be renewed.
                            Defaults to 2160h (90 days). Set to a shorter duration for testing.
                        autoCreate:
                          type: boolean
                          default: true
                          description: Whether to automatically create the Certificate resource if it doesn't exist.
                    routeLabels:
                      type: object
                      additionalProperties:
                        type: string
                      description: Extra labels merged into the generated HTTPRoute metadata.
                    routeAnnotations:
                      type: object
                      additionalProperties:
                        type: string
                      description: Extra annotations merged into the generated HTTPRoute metadata.
                metrics:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                      description: >
                        When true the operator injects nginx-prometheus-exporter
                        and mtail sidecars into every NGINX pod.
                    maxLabelCardinality:
                      type: integer
                      default: 10000
                    stubStatusPort:
                      type: integer
                      default: 9080
                    exporterPort:
                      type: integer
                      default: 9113
                    mtailPort:
                      type: integer
                      default: 3903
                    nginxExporterImage:
                      type: string
                      default: "nginx/nginx-prometheus-exporter:1.4"
                    mtailImage:
                      type: string
                      default: "ghcr.io/google/mtail:latest"
                    podMonitorEnabled:
                      type: boolean
                      default: false
                resources:
                  type: object
                  nullable: true
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp

