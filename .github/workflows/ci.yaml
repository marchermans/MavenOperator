name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  OPERATOR_IMAGE: ghcr.io/${{ github.repository_owner }}/maven-operator
  PROXY_IMAGE: ghcr.io/${{ github.repository_owner }}/maven-virtual-proxy
  CHART_NAME: maven-operator

jobs:
  # ── Compute the canonical semver for this run ───────────────────────────────
  # Rule:
  #   git tag  v1.2.3          →  version = "1.2.3"             (release)
  #   push to main             →  version = "<base>-main.<sha7>" (snapshot)
  #   push to other branch     →  version = "<base>-<branch>.<sha7>"
  #
  # <base> is read from the VERSION file at the repo root.
  # The "+" build-metadata separator is avoided because Helm OCI does not allow it.
  version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      is_release: ${{ steps.compute.outputs.is_release }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute version string
        id: compute
        run: |
          BASE="$(cat VERSION | tr -d '[:space:]')"
          SHA7="${GITHUB_SHA::7}"
          REF="${GITHUB_REF}"

          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/v}"
            IS_RELEASE="true"
          else
            BRANCH="${GITHUB_REF_NAME}"
            BRANCH_SAFE="$(echo "$BRANCH" | tr -cs 'a-zA-Z0-9-' '-' | sed 's/-*$//')"
            VERSION="${BASE}-${BRANCH_SAFE}.${SHA7}"
            IS_RELEASE="false"
          fi

          echo "version=${VERSION}"   >> "$GITHUB_OUTPUT"
          echo "is_release=${IS_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${VERSION}  (is_release=${IS_RELEASE})"

  # ── Build & Unit tests ──────────────────────────────────────────────────────
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit Tests (MavenOperator.Tests.Unit)
        run: >
          dotnet test MavenOperator.Tests.Unit/MavenOperator.Tests.Unit.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=unit-results.trx"
          --collect "XPlat Code Coverage"

      - name: Unit Tests (MavenOperator.Tests.Unit.VirtualProxy)
        run: >
          dotnet test MavenOperator.Tests.Unit.VirtualProxy/MavenOperator.Tests.Unit.VirtualProxy.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=unit-vp-results.trx"
          --collect "XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

  # ── Docker build (tarballs for test jobs; NOT pushed to registry yet) ────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [version, build-and-test]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build operator image (export tarball only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: MavenOperator/Dockerfile
          push: false
          tags: maven-operator:ci
          outputs: type=docker,dest=/tmp/maven-operator.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build virtual-proxy image (export tarball only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: MavenOperator.VirtualProxy/Dockerfile
          push: false
          tags: maven-virtual-proxy:ci
          outputs: type=docker,dest=/tmp/maven-virtual-proxy.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            /tmp/maven-operator.tar
            /tmp/maven-virtual-proxy.tar
          retention-days: 1

  # ── Integration tests ───────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Download pre-built Docker images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load -i /tmp/maven-operator.tar
          docker load -i /tmp/maven-virtual-proxy.tar

      - name: Run integration tests
        env:
          OPERATOR_IMAGE: maven-operator:ci
          VIRTUAL_PROXY_IMAGE: maven-virtual-proxy:ci
        run: ./scripts/run-tests.sh integration --cleanup

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: "**/*.trx"

  # ── E2E tests ───────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Setup Java (Maven/Gradle toolchain)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Maven
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends maven

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Download pre-built Docker images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load -i /tmp/maven-operator.tar
          docker load -i /tmp/maven-virtual-proxy.tar

      - name: Run E2E tests
        env:
          OPERATOR_IMAGE: maven-operator:ci
          VIRTUAL_PROXY_IMAGE: maven-virtual-proxy:ci
        run: ./scripts/run-tests.sh e2e --cleanup

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: "**/*.trx"

  # ── Performance tests (smoke + BenchmarkDotNet; k6 load is local-only) ──────
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Download pre-built Docker images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load -i /tmp/maven-operator.tar
          docker load -i /tmp/maven-virtual-proxy.tar

      - name: Run performance smoke tests (xUnit ceilings)
        env:
          OPERATOR_IMAGE: maven-operator:ci
          VIRTUAL_PROXY_IMAGE: maven-virtual-proxy:ci
        run: ./scripts/run-tests.sh performance --perf-mode smoke

      - name: Run BenchmarkDotNet micro-benchmarks
        env:
          OPERATOR_IMAGE: maven-operator:ci
          VIRTUAL_PROXY_IMAGE: maven-virtual-proxy:ci
        run: ./scripts/run-tests.sh performance --perf-mode benchmark

      - name: Upload performance test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-results
          path: |
            **/*.trx
            .benchmarks/BenchmarkDotNet.Artifacts/**

  # ── Release: push images + publish Helm chart (only when ALL tests pass) ────
  release:
    name: Push Images & Publish Helm Chart
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [version, build-and-test, docker-build, integration, e2e, performance]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the full set of Docker tags from the canonical version.
      # Release (v1.2.3 tag):  1.2.3, 1.2, latest
      # Snapshot (branch push): 0.1.0-main.abc1234, main
      - name: Compute image tags
        id: tags
        env:
          VERSION: ${{ needs.version.outputs.version }}
          IS_RELEASE: ${{ needs.version.outputs.is_release }}
        run: |
          BASE_OP="${OPERATOR_IMAGE}:${VERSION}"
          BASE_PX="${PROXY_IMAGE}:${VERSION}"

          if [[ "$IS_RELEASE" == "true" ]]; then
            MAJOR_MINOR="${VERSION%.*}"
            OP_TAGS="${BASE_OP},${OPERATOR_IMAGE}:${MAJOR_MINOR},${OPERATOR_IMAGE}:latest"
            PX_TAGS="${BASE_PX},${PROXY_IMAGE}:${MAJOR_MINOR},${PROXY_IMAGE}:latest"
          else
            BRANCH_SAFE="$(echo "${GITHUB_REF_NAME}" | tr -cs 'a-zA-Z0-9-' '-' | sed 's/-*$//')"
            OP_TAGS="${BASE_OP},${OPERATOR_IMAGE}:${BRANCH_SAFE}"
            PX_TAGS="${BASE_PX},${PROXY_IMAGE}:${BRANCH_SAFE}"
          fi

          echo "operator_tags=${OP_TAGS}" >> "$GITHUB_OUTPUT"
          echo "proxy_tags=${PX_TAGS}"    >> "$GITHUB_OUTPUT"
          echo "Operator tags: ${OP_TAGS}"
          echo "Proxy tags:    ${PX_TAGS}"

      - name: Push operator image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: MavenOperator/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.operator_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push virtual-proxy image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: MavenOperator.VirtualProxy/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.proxy_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: "3.17.3"

      - name: Stamp version into Chart.yaml
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          sed -i "s/^version:.*/version: \"${VERSION}\"/"       charts/maven-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/maven-operator/Chart.yaml
          echo "Stamped Chart.yaml:"
          cat charts/maven-operator/Chart.yaml

      - name: Lint Helm chart
        run: helm lint charts/maven-operator


      - name: Package Helm chart
        run: helm package charts/maven-operator --destination /tmp/helm-packages

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Push Helm chart to GHCR
        run: |
          helm push /tmp/helm-packages/*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Upload Helm package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: /tmp/helm-packages/*.tgz

