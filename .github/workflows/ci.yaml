name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  OPERATOR_IMAGE: ghcr.io/${{ github.repository_owner }}/maven-operator
  PROXY_IMAGE: ghcr.io/${{ github.repository_owner }}/maven-virtual-proxy
  CHART_NAME: maven-operator

jobs:
  # ── Build & Unit tests ──────────────────────────────────────────────────────
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit Tests (MavenOperator.Tests.Unit)
        run: >
          dotnet test MavenOperator.Tests.Unit/MavenOperator.Tests.Unit.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=unit-results.trx"
          --collect "XPlat Code Coverage"

      - name: Unit Tests (MavenOperator.Tests.Unit.VirtualProxy)
        run: >
          dotnet test MavenOperator.Tests.Unit.VirtualProxy/MavenOperator.Tests.Unit.VirtualProxy.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=unit-vp-results.trx"
          --collect "XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

  # ── Docker images ───────────────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write

    outputs:
      operator_digest: ${{ steps.push-operator.outputs.digest }}
      proxy_digest: ${{ steps.push-proxy.outputs.digest }}
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata (operator)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.OPERATOR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Compute image metadata (virtual proxy)
        id: meta-proxy
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PROXY_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build & push operator image
        id: push-operator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: MavenOperator/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Also export a local tarball so downstream jobs can load it without
          # needing GHCR access or a rebuild.
          outputs: type=docker,dest=/tmp/maven-operator.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push virtual-proxy image
        id: push-proxy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: MavenOperator.VirtualProxy/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-proxy.outputs.tags }}
          labels: ${{ steps.meta-proxy.outputs.labels }}
          outputs: type=docker,dest=/tmp/maven-virtual-proxy.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Re-tag tarballs with the stable local name used by test scripts.
      - name: Re-tag images with stable local names
        run: |
          docker load -i /tmp/maven-operator.tar
          docker tag $(docker images -q | head -1) maven-operator:ci
          docker save maven-operator:ci -o /tmp/maven-operator.tar

          docker load -i /tmp/maven-virtual-proxy.tar
          docker tag $(docker images -q | head -1) maven-virtual-proxy:ci
          docker save maven-virtual-proxy:ci -o /tmp/maven-virtual-proxy.tar

      - name: Upload operator image tarball
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            /tmp/maven-operator.tar
            /tmp/maven-virtual-proxy.tar
          # Images are only needed by jobs in the same run; 1-day retention is enough.
          retention-days: 1

  # ── Helm chart ──────────────────────────────────────────────────────────────
  helm:
    name: Lint, Package & Push Helm Chart
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.17.x"

      - name: Lint Helm chart
        run: helm lint charts/maven-operator

      - name: Update appVersion in Chart.yaml from image tag
        if: github.event_name != 'pull_request'
        run: |
          TAG="${{ needs.docker.outputs.image_tag }}"
          if [[ -n "$TAG" ]]; then
            sed -i "s/^appVersion:.*/appVersion: \"${TAG}\"/" charts/maven-operator/Chart.yaml
          fi

      - name: Package Helm chart
        run: helm package charts/maven-operator --destination /tmp/helm-packages

      - name: Log in to GHCR (Helm OCI)
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Push Helm chart to GHCR
        if: github.event_name != 'pull_request'
        run: |
          helm push /tmp/helm-packages/*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Upload Helm package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: /tmp/helm-packages/*.tgz

  # ── Shared step: load pre-built images ─────────────────────────────────────
  # (inline in each job below via download-artifact + docker load)

  # ── Integration tests (on push to main only, requires k3d) ─────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Download pre-built Docker images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load -i /tmp/maven-operator.tar
          docker load -i /tmp/maven-virtual-proxy.tar

      - name: Build .NET projects
        run: dotnet build --configuration Release

      - name: Run integration tests
        env:
          OPERATOR_IMAGE: maven-operator:ci
          VIRTUAL_PROXY_IMAGE: maven-virtual-proxy:ci
        run: |
          ./scripts/run-tests.sh integration --no-build --cleanup

  # ── E2E tests (on push to main only, requires k3d + Maven/Gradle) ──────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Java (Maven/Gradle toolchain)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Maven
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends maven

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Download pre-built Docker images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load -i /tmp/maven-operator.tar
          docker load -i /tmp/maven-virtual-proxy.tar

      - name: Build .NET projects
        run: dotnet build --configuration Release

      - name: Run E2E tests
        env:
          OPERATOR_IMAGE: maven-operator:ci
          VIRTUAL_PROXY_IMAGE: maven-virtual-proxy:ci
        run: |
          ./scripts/run-tests.sh e2e --no-build --cleanup

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: "**/*.trx"

  # ── Performance tests (on push to main only) ────────────────────────────────
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6
          k6 version

      - name: Download pre-built Docker images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load -i /tmp/maven-operator.tar
          docker load -i /tmp/maven-virtual-proxy.tar

      - name: Build .NET projects
        run: dotnet build --configuration Release

      - name: Run performance tests (smoke + benchmark + load)
        env:
          OPERATOR_IMAGE: maven-operator:ci
          VIRTUAL_PROXY_IMAGE: maven-virtual-proxy:ci
        run: |
          ./scripts/run-tests.sh performance --perf-mode all --no-build --cleanup

      - name: Upload performance test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-results
          path: |
            **/*.trx
            **/BenchmarkDotNet.Artifacts/**
            MavenOperator.Tests.Performance/k6/**/*.json

