name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  OPERATOR_IMAGE: ghcr.io/${{ github.repository_owner }}/maven-operator
  PROXY_IMAGE: ghcr.io/${{ github.repository_owner }}/maven-virtual-proxy
  CHART_NAME: maven-operator

jobs:
  # ── Build & Unit tests ──────────────────────────────────────────────────────
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit Tests (MavenOperator.Tests.Unit)
        run: >
          dotnet test MavenOperator.Tests.Unit/MavenOperator.Tests.Unit.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=unit-results.trx"
          --collect "XPlat Code Coverage"

      - name: Unit Tests (MavenOperator.Tests.Unit.VirtualProxy)
        run: >
          dotnet test MavenOperator.Tests.Unit.VirtualProxy/MavenOperator.Tests.Unit.VirtualProxy.csproj
          --no-build --configuration Release
          --logger "trx;LogFileName=unit-vp-results.trx"
          --collect "XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

  # ── Docker build (produces tarballs for downstream test jobs) ───────────────
  # Images are NOT pushed here — pushing happens in the release job only after
  # all tests pass.
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata (operator)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.OPERATOR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Compute image metadata (virtual proxy)
        id: meta-proxy
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PROXY_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build operator image (export tarball only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: MavenOperator/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=docker,dest=/tmp/maven-operator.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build virtual-proxy image (export tarball only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: MavenOperator.VirtualProxy/Dockerfile
          push: false
          tags: ${{ steps.meta-proxy.outputs.tags }}
          labels: ${{ steps.meta-proxy.outputs.labels }}
          outputs: type=docker,dest=/tmp/maven-virtual-proxy.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Re-tag with stable local names used by run-tests.sh
      - name: Re-tag images with stable local names
        run: |
          docker load -i /tmp/maven-operator.tar
          docker tag $(docker images -q | head -1) maven-operator:ci
          docker save maven-operator:ci -o /tmp/maven-operator.tar

          docker load -i /tmp/maven-virtual-proxy.tar
          docker tag $(docker images -q | head -1) maven-virtual-proxy:ci
          docker save maven-virtual-proxy:ci -o /tmp/maven-virtual-proxy.tar

      - name: Upload image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            /tmp/maven-operator.tar
            /tmp/maven-virtual-proxy.tar
          retention-days: 1

  # ── Integration tests (on push to main only, requires k3d) ─────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Download pre-built Docker images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load -i /tmp/maven-operator.tar
          docker load -i /tmp/maven-virtual-proxy.tar

      - name: Run integration tests
        env:
          OPERATOR_IMAGE: maven-operator:ci
          VIRTUAL_PROXY_IMAGE: maven-virtual-proxy:ci
        run: |
          ./scripts/run-tests.sh integration --cleanup

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: "**/*.trx"

  # ── E2E tests (on push to main only, requires k3d + Maven/Gradle) ──────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Setup Java (Maven/Gradle toolchain)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Maven
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends maven

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Download pre-built Docker images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load -i /tmp/maven-operator.tar
          docker load -i /tmp/maven-virtual-proxy.tar

      - name: Run E2E tests
        env:
          OPERATOR_IMAGE: maven-operator:ci
          VIRTUAL_PROXY_IMAGE: maven-virtual-proxy:ci
        run: |
          ./scripts/run-tests.sh e2e --cleanup

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: "**/*.trx"

  # ── Performance tests (smoke + benchmarks; k6 load tests run locally only) ──
  # k6 load tests require dedicated infrastructure and are not run in CI.
  # Use --perf-mode load manually against a real cluster for load testing.
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Download pre-built Docker images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load -i /tmp/maven-operator.tar
          docker load -i /tmp/maven-virtual-proxy.tar

      - name: Run performance smoke tests (xUnit ceilings)
        env:
          OPERATOR_IMAGE: maven-operator:ci
          VIRTUAL_PROXY_IMAGE: maven-virtual-proxy:ci
        run: |
          ./scripts/run-tests.sh performance --perf-mode smoke

      - name: Run BenchmarkDotNet micro-benchmarks
        env:
          OPERATOR_IMAGE: maven-operator:ci
          VIRTUAL_PROXY_IMAGE: maven-virtual-proxy:ci
        run: |
          ./scripts/run-tests.sh performance --perf-mode benchmark

      - name: Upload performance test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-results
          path: |
            **/*.trx
            .benchmarks/BenchmarkDotNet.Artifacts/**

  # ── Release: push images + publish Helm chart (only when ALL tests pass) ────
  release:
    name: Push Images & Publish Helm Chart
    runs-on: ubuntu-latest
    # Only run on push to main or a version tag — never on PRs.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    # Gate on every test job. If any of them is skipped (PR), this is also skipped.
    needs: [build-and-test, docker-build, integration, e2e, performance]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata (operator)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.OPERATOR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Compute image metadata (virtual proxy)
        id: meta-proxy
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PROXY_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      # Re-use the GHA layer cache — images were already cached by docker-build.
      - name: Push operator image to GHCR
        id: push-operator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: MavenOperator/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push virtual-proxy image to GHCR
        id: push-proxy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: MavenOperator.VirtualProxy/Dockerfile
          push: true
          tags: ${{ steps.meta-proxy.outputs.tags }}
          labels: ${{ steps.meta-proxy.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: "3.17.3"

      - name: Lint Helm chart
        run: helm lint charts/maven-operator

      - name: Update appVersion in Chart.yaml from image tag
        run: |
          TAG="${{ steps.meta.outputs.version }}"
          if [[ -n "$TAG" ]]; then
            sed -i "s/^appVersion:.*/appVersion: \"${TAG}\"/" charts/maven-operator/Chart.yaml
          fi

      - name: Package Helm chart
        run: helm package charts/maven-operator --destination /tmp/helm-packages

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Push Helm chart to GHCR
        run: |
          helm push /tmp/helm-packages/*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Upload Helm package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: /tmp/helm-packages/*.tgz
